services:
  photoseller-be-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: photoseller-be-app
    restart: unless-stopped
    ports:
      - '8002:8000'
    environment:
      - NODE_ENV=development
      - DATABASE_URL=mysql://photoseller:photoseller@mariadb:3306/photoseller
      - DATABASE_HOST=mariadb
      - DATABASE_PORT=3306
      - DATABASE_NAME=photoseller
      - DATABASE_USER=photoseller
      - DATABASE_PASSWORD=photoseller
      - JWT_SECRET=your-super-secret-jwt-key-change-this-in-production
      - JWT_EXPIRES_IN=1d
    volumes:
      - .:/app
      - /app/node_modules
    networks:
      - photoseller_network
    depends_on:
      - mariadb
    command: pnpm run start:dev

  mariadb:
    image: mariadb:11
    container_name: photoseller-be
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: photoseller
      MARIADB_DATABASE: photoseller
      MARIADB_USER: photoseller
      MARIADB_PASSWORD: photoseller
    ports:
      - '3306:3306'
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./docker/mariadb/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - photoseller_network

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: photoseller-phpmyadmin
    restart: unless-stopped
    ports:
      - '8080:80'
    environment:
      PMA_HOST: mariadb
      PMA_PORT: 3306
      PMA_USER: photoseller
      PMA_PASSWORD: photoseller
    networks:
      - photoseller_network
    depends_on:
      - mariadb

volumes:
  mariadb_data:

networks:
  photoseller_network:
    driver: bridge
